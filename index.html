<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hashemi Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- MOBILE TOP BAR -->
<div class="topbar">
  <button id="menuToggle">☰</button>
  <button id="themeToggle">🌙</button>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <a href="#home" class="nav-link active">Home</a>
  <a href="#about" class="nav-link">About</a>
  <a href="#photos" class="nav-link">Photos</a>
  <a href="#contact" class="nav-link">Contact</a>
</aside>

<main class="main">

<!-- HERO -->
<section id="home" class="section hero reveal">
  <h1>I'm <span id="typing"></span></h1>
  <p>CCNA • Web Designer • Creative Thinker</p>
</section>

<!-- ABOUT -->
<section id="about" class="section reveal">
  <h2>About Me</h2>
  <p>
    I build modern digital experiences and strong network systems with precision and creativity.
  </p>
</section>

<!-- PHOTOS -->
<section id="photos" class="section reveal">
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="/Images/BNLD3102.JPG">
    <img src="/Images/IMG_E0272.JPG">
    <img src="/Images/IMG_E0310.JPG">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section reveal">
  <h2>Contact</h2>
  <form>
    <input placeholder="Name" required>
    <input placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
